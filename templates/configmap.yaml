apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "claude-code.fullname" . }}-entrypoint
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "claude-code.labels" . | nindent 4 }}
data:
  entrypoint.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    echo "==> Installing Claude Code..."
    curl -fsSL https://claude.ai/install.sh | bash
    echo "==> Claude Code installed at ~/.local/bin/claude"

    # ── model env-vars ────────────────────────────────────────────────────
    export ANTHROPIC_MODEL={{ .Values.models.model | quote }}
    export ANTHROPIC_SMALL_FAST_MODEL={{ .Values.models.smallFastModel | quote }}
    export ANTHROPIC_DEFAULT_OPUS_MODEL={{ .Values.models.defaultOpusModel | quote }}
    export ANTHROPIC_DEFAULT_HAIKU_MODEL={{ .Values.models.defaultHaikuModel | quote }}
    export ANTHROPIC_DEFAULT_SONNET_MODEL={{ .Values.models.defaultSonnetModel | quote }}

    # ── behaviour flags ───────────────────────────────────────────────────
    {{- if .Values.flags.disableExperimentalBetas }}
    export CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS=1
    {{- end }}
    {{- if .Values.flags.disableTelemetry }}
    export DISABLE_TELEMETRY=1
    {{- end }}

    # ── credentials come from the mounted Secret (already in env) ─────────
    # ANTHROPIC_AUTH_TOKEN and ANTHROPIC_BASE_URL are injected via envFrom.

    {{- if .Values.prompt }}
    echo "==> Running non-interactive prompt..."
    exec ~/.local/bin/claude --print {{ .Values.prompt | quote }}
    {{- else }}
    echo "==> Dropping into interactive shell.  Run 'claude' to start."
    exec bash
    {{- end }}
